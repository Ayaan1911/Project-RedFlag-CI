services:
  - type: web
    name: redflag-ci-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_PAT
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
