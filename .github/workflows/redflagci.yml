name: RedFlag CI Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    name: Trigger RedFlag CI Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send PR payload to RedFlag CI
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{
              "action": "opened",
              "number": ${{ github.event.pull_request.number }},
              "repository": {
                "full_name": "${{ github.repository }}"
              },
              "pull_request": {
                "number": ${{ github.event.pull_request.number }},
                "head": {
                  "sha": "${{ github.event.pull_request.head.sha }}"
                }
              }
            }' \
            ${{ secrets.REDFLAG_API_URL }}/webhook

      - name: Report status
        if: always()
        run: echo "RedFlag CI scan triggered for PR #${{ github.event.pull_request.number }}"
